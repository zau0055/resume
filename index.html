<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="履歴書・職務経歴書をブラウザで作成、プレビュー、印刷できる無料ツール">
  <title>Career Canvas｜履歴書・職務経歴書作成</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="#">Career <span>Canvas</span></a>
    <p>書く。整える。すぐ印刷。</p>
    <div class="header-actions">
      <button class="ghost" id="sampleBtn" type="button">見本を入れる</button>
      <button class="ghost" id="clearBtn" type="button">すべて消去</button>
      <button class="primary" id="printBtn" type="button">印刷・PDF保存</button>
    </div>
  </header>

  <main class="workspace">
    <section class="editor-panel" aria-label="入力フォーム">
      <div class="document-tabs" role="tablist">
        <button class="doc-tab active" data-document="resume" type="button">履歴書</button>
        <button class="doc-tab" data-document="career" type="button">職務経歴書</button>
      </div>

      <div class="save-status" id="saveStatus">入力内容はこの端末に自動保存されます</div>

      <form id="resumeForm" class="document-form">
        <fieldset>
          <legend><span>01</span> 基本情報</legend>
          <div class="field-grid two">
            <label>氏名<input name="name" placeholder="山田 太郎"></label>
            <label>ふりがな<input name="kana" placeholder="やまだ たろう"></label>
            <label>生年月日<input name="birthday" type="date"></label>
            <label>性別（任意）<input name="gender" placeholder="記載しない"></label>
            <label class="wide">住所<input name="address" placeholder="〒100-0001 東京都千代田区…"></label>
            <label>電話番号<input name="phone" type="tel" placeholder="090-0000-0000"></label>
            <label>メール<input name="email" type="email" placeholder="example@mail.com"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend><span>02</span> 学歴・職歴</legend>
          <p class="field-hint">1行に1件、「年月｜内容」の順で入力してください。</p>
          <label>学歴<textarea name="education" rows="5" placeholder="2015年4月｜〇〇大学 〇〇学部 入学&#10;2019年3月｜〇〇大学 〇〇学部 卒業"></textarea></label>
          <label>職歴<textarea name="workHistory" rows="6" placeholder="2019年4月｜株式会社〇〇 入社&#10;2024年6月｜一身上の都合により退職"></textarea></label>
        </fieldset>

        <fieldset>
          <legend><span>03</span> 免許・資格</legend>
          <textarea name="licenses" rows="5" aria-label="免許・資格" placeholder="2018年8月｜普通自動車第一種運転免許 取得&#10;2022年5月｜〇〇検定 1級 合格"></textarea>
        </fieldset>

        <fieldset>
          <legend><span>04</span> 志望動機・希望</legend>
          <label>志望動機<textarea name="motivation" rows="6" placeholder="これまでの経験を活かし…"></textarea></label>
          <label>本人希望記入欄<textarea name="requests" rows="4" placeholder="貴社規定に従います。"></textarea></label>
        </fieldset>
      </form>

      <form id="careerForm" class="document-form hidden">
        <fieldset>
          <legend><span>01</span> 文書情報</legend>
          <div class="field-grid two">
            <label>氏名<input name="careerName" placeholder="山田 太郎"></label>
            <label>作成日<input name="createdAt" type="date"></label>
          </div>
        </fieldset>
        <fieldset>
          <legend><span>02</span> 職務要約</legend>
          <textarea name="summary" rows="7" aria-label="職務要約" placeholder="〇〇業界で〇年間、主に…"></textarea>
        </fieldset>
        <fieldset>
          <legend><span>03</span> 職務経歴</legend>
          <p class="field-hint">会社ごとに「会社名・期間」「事業内容」「担当業務・実績」を入力します。</p>
          <div id="companies"></div>
          <button class="add-button" id="addCompanyBtn" type="button">＋ 職歴を追加</button>
        </fieldset>
        <fieldset>
          <legend><span>04</span> 活かせる経験・スキル</legend>
          <textarea name="skills" rows="6" aria-label="経験・スキル" placeholder="・〇〇の業務経験（5年）&#10;・Excel、PowerPoint…"></textarea>
        </fieldset>
        <fieldset>
          <legend><span>05</span> 自己PR</legend>
          <textarea name="selfPr" rows="8" aria-label="自己PR" placeholder="私の強みは…"></textarea>
        </fieldset>
      </form>
    </section>

    <section class="preview-panel" aria-label="プレビュー">
      <div class="preview-toolbar">
        <span><i></i> ライブプレビュー</span>
        <span class="paper-label">A4</span>
      </div>
      <div id="printArea">
        <article id="resumePreview" class="paper resume-paper"></article>
        <article id="careerPreview" class="paper career-paper hidden"></article>
      </div>
    </section>
  </main>

  <template id="companyTemplate">
    <section class="company-card">
      <div class="company-head"><strong>職歴</strong><button class="remove-company" type="button">削除</button></div>
      <div class="field-grid two">
        <label>会社名<input data-company="company" placeholder="株式会社〇〇"></label>
        <label>在籍期間<input data-company="period" placeholder="2019年4月〜2024年6月"></label>
        <label class="wide">事業内容・規模<input data-company="business" placeholder="〇〇事業／従業員100名"></label>
        <label class="wide">担当業務・実績<textarea data-company="details" rows="6" placeholder="【担当業務】&#10;・〇〇&#10;【実績】&#10;・〇〇を改善し、工数を20％削減"></textarea></label>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
